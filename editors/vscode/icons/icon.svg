<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <!--
    Pixel art dragon — 8px grid (16×16 logical pixels → 128×128 canvas)
    Palette:
      #173a33  dark outline
      #23bfa8  body teal
      #1a8f82  body shadow
      #ffab3a  belly orange
      #ffd25a  belly highlight
      #f78c2a  horn / tail tip
      #ffffff  eye white
      #0e1716  pupil
  -->

  <!-- ═══ ROW 0 (y=0) — horn tips ═══ -->
  <rect x="40" y="0"  width="8" height="8" fill="#f78c2a"/>
  <rect x="80" y="0"  width="8" height="8" fill="#f78c2a"/>

  <!-- ═══ ROW 1 (y=8) — horns + head top outline ═══ -->
  <rect x="32" y="8"  width="8" height="8" fill="#173a33"/>
  <rect x="40" y="8"  width="8" height="8" fill="#f78c2a"/>
  <rect x="48" y="8"  width="32" height="8" fill="#173a33"/>
  <rect x="80" y="8"  width="8" height="8" fill="#f78c2a"/>
  <rect x="88" y="8"  width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 2 (y=16) — head ═══ -->
  <rect x="24" y="16" width="8"  height="8" fill="#173a33"/>
  <rect x="32" y="16" width="64" height="8" fill="#23bfa8"/>
  <rect x="96" y="16" width="8"  height="8" fill="#173a33"/>

  <!-- ═══ ROW 3 (y=24) — eyes row ═══ -->
  <rect x="16" y="24" width="8"  height="8" fill="#173a33"/>
  <rect x="24" y="24" width="8"  height="8" fill="#23bfa8"/>
  <rect x="32" y="24" width="16" height="8" fill="#ffffff"/>  <!-- left eye white -->
  <rect x="48" y="24" width="8"  height="8" fill="#23bfa8"/>
  <rect x="56" y="24" width="16" height="8" fill="#ffffff"/>  <!-- right eye white -->
  <rect x="72" y="24" width="24" height="8" fill="#23bfa8"/>
  <rect x="96" y="24" width="8"  height="8" fill="#173a33"/>

  <!-- ═══ ROW 4 (y=32) — pupils ═══ -->
  <rect x="16" y="32" width="8"  height="8" fill="#173a33"/>
  <rect x="24" y="32" width="8"  height="8" fill="#23bfa8"/>
  <rect x="32" y="32" width="8"  height="8" fill="#ffffff"/>
  <rect x="40" y="32" width="8"  height="8" fill="#0e1716"/>  <!-- left pupil -->
  <rect x="48" y="32" width="8"  height="8" fill="#23bfa8"/>
  <rect x="56" y="32" width="8"  height="8" fill="#ffffff"/>
  <rect x="64" y="32" width="8"  height="8" fill="#0e1716"/>  <!-- right pupil -->
  <rect x="72" y="32" width="24" height="8" fill="#23bfa8"/>
  <rect x="96" y="32" width="8"  height="8" fill="#173a33"/>
  <!-- tiny eye-shine -->
  <rect x="40" y="32" width="4"  height="4" fill="#ffffff"/>
  <rect x="64" y="32" width="4"  height="4" fill="#ffffff"/>

  <!-- ═══ ROW 5 (y=40) — snout / smile ═══ -->
  <rect x="8"  y="40" width="8"  height="8" fill="#173a33"/>
  <rect x="16" y="40" width="80" height="8" fill="#23bfa8"/>
  <rect x="96" y="40" width="8"  height="8" fill="#173a33"/>
  <rect x="104" y="40" width="8" height="8" fill="#173a33"/>
  <!-- smile curve (two dark pixels) -->
  <rect x="56" y="44" width="8"  height="4" fill="#173a33"/>
  <rect x="48" y="44" width="8"  height="4" fill="#173a33"/>

  <!-- ═══ ROW 6 (y=48) — neck + wing starts ═══ -->
  <rect x="0"  y="48" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="48" width="8"  height="8" fill="#1a8f82"/>  <!-- left wing -->
  <rect x="16" y="48" width="8"  height="8" fill="#173a33"/>
  <rect x="24" y="48" width="8"  height="8" fill="#173a33"/>
  <rect x="32" y="48" width="56" height="8" fill="#23bfa8"/>  <!-- neck -->
  <rect x="88" y="48" width="8"  height="8" fill="#173a33"/>
  <rect x="96" y="48" width="16" height="8" fill="#1a8f82"/>  <!-- right wing -->
  <rect x="112" y="48" width="8" height="8" fill="#173a33"/>
  <rect x="120" y="48" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 7 (y=56) — body top + wings ═══ -->
  <rect x="0"  y="56" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="56" width="16" height="8" fill="#1a8f82"/>  <!-- left wing -->
  <rect x="24" y="56" width="8"  height="8" fill="#173a33"/>
  <rect x="32" y="56" width="64" height="8" fill="#23bfa8"/>  <!-- body -->
  <rect x="96" y="56" width="8"  height="8" fill="#173a33"/>
  <rect x="104" y="56" width="16" height="8" fill="#1a8f82"/> <!-- right wing -->
  <rect x="120" y="56" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 8 (y=64) — body + belly starts ═══ -->
  <rect x="0"  y="64" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="64" width="8"  height="8" fill="#1a8f82"/>  <!-- left wing tip -->
  <rect x="16" y="64" width="8"  height="8" fill="#173a33"/>
  <rect x="24" y="64" width="16" height="8" fill="#23bfa8"/>
  <rect x="40" y="64" width="48" height="8" fill="#ffab3a"/>  <!-- belly -->
  <rect x="88" y="64" width="16" height="8" fill="#23bfa8"/>
  <rect x="104" y="64" width="8" height="8" fill="#173a33"/>
  <rect x="112" y="64" width="8" height="8" fill="#1a8f82"/>  <!-- right wing tip -->
  <rect x="120" y="64" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 9 (y=72) — body wide ═══ -->
  <rect x="0"  y="72" width="16" height="8" fill="#173a33"/>
  <rect x="16" y="72" width="16" height="8" fill="#23bfa8"/>
  <rect x="32" y="72" width="8"  height="8" fill="#ffab3a"/>
  <rect x="40" y="72" width="8"  height="8" fill="#ffd25a"/>  <!-- belly shine -->
  <rect x="48" y="72" width="32" height="8" fill="#ffab3a"/>
  <rect x="80" y="72" width="8"  height="8" fill="#ffd25a"/>  <!-- belly shine -->
  <rect x="88" y="72" width="24" height="8" fill="#23bfa8"/>
  <rect x="112" y="72" width="16" height="8" fill="#173a33"/>

  <!-- ═══ ROW 10 (y=80) — body ═══ -->
  <rect x="0"  y="80" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="80" width="24" height="8" fill="#23bfa8"/>
  <rect x="32" y="80" width="64" height="8" fill="#ffab3a"/>
  <rect x="96" y="80" width="24" height="8" fill="#23bfa8"/>
  <rect x="120" y="80" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 11 (y=88) — body / leg junction ═══ -->
  <rect x="0"  y="88" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="88" width="112" height="8" fill="#23bfa8"/>
  <rect x="120" y="88" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 12 (y=96) — upper legs ═══ -->
  <rect x="0"  y="96" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="96" width="24" height="8" fill="#23bfa8"/>
  <rect x="32" y="96" width="8"  height="8" fill="#173a33"/>
  <rect x="40" y="96" width="40" height="8" fill="#23bfa8"/>  <!-- belly underside -->
  <rect x="80" y="96" width="8"  height="8" fill="#173a33"/>
  <rect x="88" y="96" width="24" height="8" fill="#23bfa8"/>
  <rect x="112" y="96" width="16" height="8" fill="#173a33"/>

  <!-- ═══ ROW 13 (y=104) — lower legs ═══ -->
  <rect x="8"  y="104" width="8"  height="8" fill="#173a33"/>
  <rect x="16" y="104" width="16" height="8" fill="#1a8f82"/>
  <rect x="32" y="104" width="8"  height="8" fill="#173a33"/>
  <rect x="88" y="104" width="8"  height="8" fill="#173a33"/>
  <rect x="96" y="104" width="16" height="8" fill="#1a8f82"/>
  <rect x="112" y="104" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 14 (y=112) — feet / claws ═══ -->
  <rect x="8"  y="112" width="8"  height="8" fill="#173a33"/>
  <rect x="16" y="112" width="8"  height="8" fill="#f78c2a"/>  <!-- left claw -->
  <rect x="24" y="112" width="8"  height="8" fill="#1a8f82"/>
  <rect x="32" y="112" width="8"  height="8" fill="#f78c2a"/>  <!-- left claw -->
  <rect x="40" y="112" width="8"  height="8" fill="#173a33"/>
  <rect x="88" y="112" width="8"  height="8" fill="#173a33"/>
  <rect x="96" y="112" width="8"  height="8" fill="#f78c2a"/>  <!-- right claw -->
  <rect x="104" y="112" width="8" height="8" fill="#1a8f82"/>
  <rect x="112" y="112" width="8" height="8" fill="#f78c2a"/>  <!-- right claw -->
  <rect x="120" y="112" width="8" height="8" fill="#173a33"/>

  <!-- ═══ ROW 15 (y=120) — tail tip ═══ -->
  <rect x="0"  y="120" width="8"  height="8" fill="#173a33"/>
  <rect x="8"  y="120" width="8"  height="8" fill="#f78c2a"/>
  <rect x="16" y="120" width="8"  height="8" fill="#173a33"/>

</svg>
