# Project-local Cargo configuration
#
# Uses Xcode's bundled libclang (Apple clang 17) instead of Homebrew LLVM.
# Xcode's libclang correctly handles the latest Apple SDKs (iOS 26, macOS 26).
# Homebrew LLVM 22 has symbol conflicts with Xcode SDKs and crashes on parse.
#
# LIBCLANG_PATH  — used by clang-sys's build script to locate libclang.dylib
# DYLD_LIBRARY_PATH — used by macOS dyld at runtime to load libclang.dylib
#
# rustflags -rpath — bakes LC_RPATH into the binary so that macOS dyld
#                     can find libclang.dylib at runtime without any extra
#                     environment variables (needed when VS Code launches
#                     the binary directly, outside of a cargo shell).

[env]
LIBCLANG_PATH = "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib"
DYLD_LIBRARY_PATH = "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib"

[build]
rustflags = [
  "-C", "link-arg=-Wl,-rpath,/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib",
]
