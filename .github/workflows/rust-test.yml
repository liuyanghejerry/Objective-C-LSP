name: Rust Tests

on:
  push:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-test.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/rust-test.yml"

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install libclang
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev
          # clang-sys needs LIBCLANG_PATH on Ubuntu where libclang lives under /usr/lib/llvm-XX/lib/
          LIBCLANG_SO=$(find /usr/lib -name 'libclang.so' -o -name 'libclang-*.so' 2>/dev/null | head -1)
          if [ -z "$LIBCLANG_SO" ]; then
            echo "ERROR: libclang.so not found after installing libclang-dev" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "$LIBCLANG_SO")" >> $GITHUB_ENV

      - name: Run tests
        run: cargo test --workspace
