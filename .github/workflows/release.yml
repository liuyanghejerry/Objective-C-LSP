name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  EXTENSION_DIR: editors/vscode

jobs:
  # ── Step 0: Run tests before building anything ──────────────────────────────
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install libclang
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev
          LIBCLANG_SO=$(find /usr/lib -name 'libclang.so' -o -name 'libclang-*.so' 2>/dev/null | head -1)
          if [ -z "$LIBCLANG_SO" ]; then
            echo "ERROR: libclang.so not found after installing libclang-dev" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "$LIBCLANG_SO")" >> $GITHUB_ENV

      - name: Run tests
        run: cargo test --workspace

  # ── Step 1: Build platform-specific Rust binaries ──────────────────────────
  build-binary:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            rust-target: aarch64-apple-darwin
            vsce-target: darwin-arm64
          - os: macos-14
            rust-target: x86_64-apple-darwin
            vsce-target: darwin-x64
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            vsce-target: linux-x64
          - os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            vsce-target: linux-arm64

    runs-on: ${{ matrix.os }}
    name: Build binary (${{ matrix.vsce-target }})

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # macOS: ensure Xcode provides libclang
      - name: Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app

      # Linux: install libclang-dev and set LIBCLANG_PATH
      - name: Install libclang
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev
          LIBCLANG_SO=$(find /usr/lib -name 'libclang.so' -o -name 'libclang-*.so' 2>/dev/null | head -1)
          if [ -z "$LIBCLANG_SO" ]; then
            echo "ERROR: libclang.so not found after installing libclang-dev" >&2
            exit 1
          fi
          echo "LIBCLANG_PATH=$(dirname "$LIBCLANG_SO")" >> $GITHUB_ENV

      # Sync Cargo.toml versions with tag
      - name: Patch Cargo.toml versions
        run: |
          for toml in crates/objc-lsp/Cargo.toml crates/objc-syntax/Cargo.toml crates/objc-semantic/Cargo.toml crates/objc-intelligence/Cargo.toml crates/objc-project/Cargo.toml crates/objc-store/Cargo.toml; do
            sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" "$toml"
            rm -f "$toml.bak"
          done
          echo "Patched Cargo.toml versions to $VERSION"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.rust-target }} -p objc-lsp

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.vsce-target }}
          path: target/${{ matrix.rust-target }}/release/objc-lsp
          if-no-files-found: error
          retention-days: 1

  # ── Step 2: Package platform-specific .vsix files ──────────────────────────
  package-vsix:
    needs: build-binary
    runs-on: ubuntu-latest
    name: Package VSIX (${{ matrix.vsce-target }})

    strategy:
      matrix:
        vsce-target:
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch package.json version
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Install extension dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npm ci

      - name: Build extension
        working-directory: ${{ env.EXTENSION_DIR }}
        run: node esbuild.mjs

      - name: Download platform binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.vsce-target }}
          path: ${{ env.EXTENSION_DIR }}/bin

      - name: Make binary executable
        run: chmod +x ${{ env.EXTENSION_DIR }}/bin/objc-lsp

      - name: Package platform-specific VSIX
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npx vsce package --target ${{ matrix.vsce-target }} --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce-target }}
          path: ${{ env.EXTENSION_DIR }}/*.vsix
          if-no-files-found: error
          retention-days: 5

  # ── Step 3: Package Open-VSX extension ──────────────────────────────────────
  package-ovsx:
    needs: build-binary
    runs-on: ubuntu-latest
    name: Package Open-VSX (${{ matrix.vsce-target }})
    strategy:
      matrix:
        vsce-target:
          - darwin-arm64
          - darwin-x64
          - linux-x64
          - linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Patch package.json version
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npm version "$VERSION" --no-git-tag-version

      - name: Install extension dependencies
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npm ci

      - name: Build extension
        working-directory: ${{ env.EXTENSION_DIR }}
        run: node esbuild.mjs

      - name: Download platform binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.vsce-target }}
          path: ${{ env.EXTENSION_DIR }}/bin

      - name: Make binary executable
        run: chmod +x ${{ env.EXTENSION_DIR }}/bin/objc-lsp

      - name: Package Open-VSX artifact
        working-directory: ${{ env.EXTENSION_DIR }}
        run: npx vsce package --target ${{ matrix.vsce-target }} --no-dependencies -o objc-lsp-${VERSION}-ovsx-${{ matrix.vsce-target }}.vsix

      - name: Upload Open-VSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovsx-${{ matrix.vsce-target }}
          path: ${{ env.EXTENSION_DIR }}/*-ovsx-${{ matrix.vsce-target }}.vsix
          if-no-files-found: error
          retention-days: 5

  # ── Step 4: Build Zed extension WASM ──────────────────────────────────────
  build-zed:
    needs: test
    runs-on: ubuntu-latest
    name: Build Zed extension (WASM)

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      # Sync Zed extension version with tag
      - name: Patch Zed extension versions
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" editors/zed/extension.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" editors/zed/Cargo.toml
          echo "Patched Zed versions to $VERSION"

      - name: Build Zed extension
        working-directory: editors/zed
        run: cargo build --release --target wasm32-wasip1

      - name: Prepare extension package
        run: |
          mkdir -p zed-extension
          cp editors/zed/extension.toml zed-extension/
          cp editors/zed/LICENSE zed-extension/
          cp -r editors/zed/languages zed-extension/
          cp editors/zed/target/wasm32-wasip1/release/objc_lsp_zed.wasm zed-extension/extension.wasm

      - name: Archive Zed extension
        run: tar -czf zed-extension.tar.gz -C zed-extension .

      - name: Upload Zed extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-extension
          path: zed-extension.tar.gz
          if-no-files-found: error
          retention-days: 5

  # ── Step 5: Publish to GitHub Releases ─────────────────────────────────────
  publish:
    needs: [package-vsix, package-ovsx, build-binary, build-zed]
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: vsix-artifacts
          merge-multiple: true

      - name: Download Open-VSX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ovsx-*
          path: ovsx-artifacts
          merge-multiple: true

      - name: Download raw binaries for Zed runtime download
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binary-artifacts
          merge-multiple: false

      - name: Prepare binary release assets
        run: |
          mkdir -p release-binaries
          for dir in binary-artifacts/binary-*/; do
            platform=$(basename "$dir" | sed 's/^binary-//')
            cp "$dir/objc-lsp" "release-binaries/objc-lsp-$platform"
          done
          ls -lh release-binaries/

      - name: Download Zed extension
        uses: actions/download-artifact@v4
        with:
          name: zed-extension
          path: zed-artifacts

      - name: List release files
        run: |
          echo '=== VSIX files ==='
          ls -lh vsix-artifacts/
          echo '=== Open-VSX files ==='
          ls -lh ovsx-artifacts/
          echo '=== Binary files ==='
          ls -lh release-binaries/
          echo '=== Zed extension ==='
          ls -lh zed-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vsix-artifacts/*.vsix
            ovsx-artifacts/*-ovsx-*.vsix
            release-binaries/objc-lsp-*
            zed-artifacts/zed-extension.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}

      # ── Uncomment to publish to VS Code Marketplace ──
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      #
      # - name: Install vsce
      #   run: npm install -g @vscode/vsce
      #
      # - name: Publish to Marketplace
      #   run: vsce publish --packagePath vsix-artifacts/*.vsix
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── Uncomment to publish to Open VSX Registry ──
